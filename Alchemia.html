<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ALCHEMIA — combine everything</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Space+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- periodic table element data -->
<script src="periodic-elements.js"></script>
<!-- recipes (plain JS — no babel) -->
<script src="recipes.js"></script>
<!-- procedural pixel-art icon renderer -->
<script src="icons.js"></script>
<!-- engine (plain JS) -->
<script src="engine.js"></script>
<!-- tweaks panel (JSX) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<!-- components (JSX) — loaded in dependency order -->
<script type="text/babel" src="components/pixel-icons.jsx"></script>
<script type="text/babel" src="components/top-bar.jsx"></script>
<script type="text/babel" src="components/play-area.jsx"></script>
<script type="text/babel" src="components/library.jsx"></script>
<script type="text/babel" src="components/hint-ticker.jsx"></script>
<script type="text/babel" src="components/toasts.jsx"></script>
<script type="text/babel" src="components/help.jsx"></script>
<!-- main app (JSX) -->
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
