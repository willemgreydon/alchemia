<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ALCHEMIA — combine everything</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Space+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ====================== reset / base ====================== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin:0; padding:0; height:100%; overflow:hidden; }
  /* iOS Safari zooms on focus if font-size < 16px — prevent it */
  @supports (-webkit-touch-callout: none) {
    input, select, textarea { font-size: 16px !important; }
  }
  body {
    font-family: 'DM Mono', 'Space Mono', ui-monospace, monospace;
    color: #0E0E0E;
    background: #F2EDE3;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
    touch-action: none;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }

  :root {
    --bg: #F2EDE3;
    --ink: #0E0E0E;
    --ink-2: #2E2A22;
    --paper: #FAF6EC;
    --paper-2: #EDE6D6;
    --line: #0E0E0E;
    --orange: #FF5A1F;
    --magenta: #B847C2;
    --gold: #FFC838;
    --teal: #2E8B8B;
    --shadow: 0 2px 0 rgba(14,14,14,0.18);
  }

  /* ====================== layout ====================== */
  .alc-root {
    position: fixed; inset: 0;
    background: var(--bg);
  }
  canvas.alc-ambient {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  canvas.alc-particles {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ====================== top bar ====================== */
  .alc-topbar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 96px;
    padding: 18px 28px;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    border-bottom: 2px solid var(--ink);
    background: linear-gradient(180deg, rgba(242,237,227,0.95) 0%, rgba(242,237,227,0.7) 100%);
    backdrop-filter: blur(6px);
  }
  .alc-brand { display: flex; flex-direction: column; gap: 2px; }
  .alc-logo {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 44px;
    line-height: 0.85;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .alc-tagline {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
    opacity: 0.7;
  }
  .alc-counter { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .alc-counter-num {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    display: flex; align-items: baseline; gap: 4px;
  }
  .alc-counter-discovered { font-size: 36px; color: var(--ink); line-height: 1; }
  .alc-counter-slash { font-size: 22px; opacity: 0.4; }
  .alc-counter-total { font-size: 22px; opacity: 0.6; }
  .alc-counter-bar {
    width: 220px; height: 6px;
    border: 2px solid var(--ink);
    background: var(--paper);
    position: relative;
  }
  .alc-counter-bar-fill {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, var(--orange), var(--magenta), var(--gold));
    transition: width 0.6s cubic-bezier(.2,.7,.2,1);
  }
  .alc-counter-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .alc-actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
  .alc-btn {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 16px;
    background: var(--paper);
    color: var(--ink);
    border: 2px solid var(--ink);
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 0.06em;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .alc-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  .alc-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  .alc-btn-ghost { background: transparent; box-shadow: none; }
  .alc-btn-ghost:hover { background: var(--paper); }

  /* ====================== play area ====================== */
  .alc-playarea {
    position: absolute;
    top: 96px;
    left: 0;
    right: 340px;
    bottom: 72px;
    overflow: hidden;
    z-index: 2;
  }
  .alc-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px;
    pointer-events: none;
    opacity: 0.45;
  }
  .alc-empty-glyph {
    font-family: 'Pixelify Sans', monospace;
    font-size: 60px;
    letter-spacing: 0.2em;
    color: var(--ink);
    animation: glyph-spin 12s linear infinite;
  }
  @keyframes glyph-spin {
    0% { letter-spacing: 0.2em; }
    50% { letter-spacing: 0.45em; }
    100% { letter-spacing: 0.2em; }
  }
  .alc-empty-title {
    font-family: 'Pixelify Sans', monospace;
    font-size: 26px;
    font-weight: 700;
    text-transform: lowercase;
    text-align: center;
    max-width: 320px;
    line-height: 1.1;
  }
  .alc-empty-sub {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-2);
    text-align: center;
  }

  /* ====================== pixel icon animations ====================== */
  .alc-pixel {
    width: 100%; height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .alc-pixel .pa-anim {
    width: 100%; height: 100%;
    display: block;
    transform-origin: 50% 60%;
    will-change: transform;
  }
  .alc-pixel .pa-body { transform-origin: 50% 60%; }
  .alc-pixel .pa-overlay { transform-origin: 50% 50%; }

  @keyframes pa-bob {
    0%, 100% { transform: translateY(0) scaleY(1); }
    50% { transform: translateY(-6%) scaleY(1.03); }
  }
  .pa-bob { animation: pa-bob 2.4s ease-in-out infinite; }

  @keyframes pa-flicker {
    0%, 100% { transform: scale(1) skewX(0); }
    25% { transform: scale(1.04, 0.96) skewX(-2deg); }
    50% { transform: scale(0.97, 1.04) skewX(1deg); }
    75% { transform: scale(1.02, 0.98) skewX(2deg); }
  }
  .pa-flicker { animation: pa-flicker 0.6s ease-in-out infinite; }

  @keyframes pa-shake-sub {
    0%, 100% { transform: translateX(0); }
    25%, 75% { transform: translateX(-0.4%); }
    50% { transform: translateX(0.4%); }
  }
  .pa-shake-sub { animation: pa-shake-sub 5s ease-in-out infinite; }

  @keyframes pa-drift {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(4%); }
  }
  .pa-drift { animation: pa-drift 4s ease-in-out infinite; }

  @keyframes pa-pulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.08); filter: brightness(1.15); }
  }
  .pa-pulse { animation: pa-pulse 2s ease-in-out infinite; }

  @keyframes pa-sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  .pa-sway { animation: pa-sway 3s ease-in-out infinite; transform-origin: 50% 90%; }

  @keyframes pa-breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .pa-breathe { animation: pa-breathe 3.2s ease-in-out infinite; }

  @keyframes pa-spin {
    from { transform: rotate(0); }
    to { transform: rotate(360deg); }
  }
  .pa-spin { animation: pa-spin 14s linear infinite; transform-origin: 50% 50%; }

  @keyframes pa-jitter {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-2%, 1%); }
    40% { transform: translate(2%, -1%); }
    60% { transform: translate(-1%, 2%); }
    80% { transform: translate(1%, -2%); }
  }
  .pa-jitter { animation: pa-jitter 0.4s steps(5, jump-none) infinite; }

  @keyframes pa-blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  .pa-blink { animation: pa-blink 4.5s ease-in-out infinite; transform-origin: 50% 50%; }

  @keyframes pa-creep {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-3%) rotate(2deg); }
  }
  .pa-creep { animation: pa-creep 3.6s ease-in-out infinite; }

  @keyframes pa-swim {
    0%, 100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-4%) rotate(-3deg); }
    75% { transform: translateX(4%) rotate(3deg); }
  }
  .pa-swim { animation: pa-swim 2.4s ease-in-out infinite; }

  @keyframes pa-flap {
    0%, 100% { transform: translateY(0) scaleY(1); }
    50% { transform: translateY(-3%) scaleY(0.92); }
  }
  .pa-flap { animation: pa-flap 0.5s ease-in-out infinite; }

  @keyframes pa-flip {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(-1); }
  }
  .pa-flip { animation: pa-flip 4s ease-in-out infinite; }

  @keyframes pa-bubble {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-4%) rotate(2deg); }
  }
  .pa-bubble { animation: pa-bubble 3s ease-in-out infinite; }

  .pa-still { /* no animation */ }

  /* overlay animations */
  @keyframes pa-sparkle {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(1.4); }
  }
  .pa-ov-sparkle { animation: pa-sparkle 1.6s ease-in-out infinite; transform-origin: 50% 50%; }

  @keyframes pa-twinkle {
    0%, 100% { opacity: 1; }
    25% { opacity: 0.2; }
    50% { opacity: 0.9; }
    75% { opacity: 0.3; }
  }
  .pa-ov-twinkle { animation: pa-twinkle 1.8s steps(4, jump-none) infinite; }

  .pa-ov-still { /* none */ }
  .pa-ov-flicker { animation: pa-flicker 0.55s ease-in-out infinite; transform-origin: 50% 0%; }
  .pa-ov-pulse { animation: pa-pulse 2s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .pa-anim, .pa-overlay { animation: none !important; }
  }


  .alc-tile-wrap {
    position: absolute;
    will-change: transform;
    cursor: grab;
    touch-action: none;
    top: 0; left: 0;
  }
  .alc-tile-wrap.is-dragging { cursor: grabbing; z-index: 999; }
  .alc-tile-wrap.is-dragging .alc-tile { box-shadow: 6px 6px 0 var(--ink); transform: scale(1.05); }
  .alc-tile {
    position: relative;
    width: 64px; height: 64px;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow 0.12s, transform 0.12s;
    --tint: var(--gold);
  }
  .alc-tile::before {
    content: '';
    position: absolute; inset: -2px;
    border: 2px solid transparent;
    background: var(--tint);
    opacity: 0.18;
    z-index: -1;
    pointer-events: none;
  }
  .alc-tile-emoji {
    width: 48px; height: 48px;
    line-height: 1;
    pointer-events: none;
    display: block;
  }
  .alc-tile-emoji svg { display: block; width: 100%; height: 100%; }
  .alc-tile-label {
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: lowercase;
    color: var(--ink);
    background: rgba(250, 246, 236, 0.85);
    padding: 2px 5px;
    border: 1px solid var(--ink);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.95;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .alc-tile-x {
    position: absolute;
    top: -8px; right: -8px;
    width: 18px; height: 18px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
    cursor: pointer;
  }
  .alc-tile-wrap:hover .alc-tile-x { opacity: 1; }
  .alc-tile.is-new {
    animation: tile-pop 0.55s cubic-bezier(.34,1.6,.4,1);
  }
  @keyframes tile-pop {
    0% { transform: scale(0.2) rotate(-12deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .alc-tile.is-shake { animation: tile-shake 0.4s ease-in-out; }
  @keyframes tile-shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px) rotate(-2deg); }
    40%, 80% { transform: translateX(6px) rotate(2deg); }
  }

  /* ====================== library ====================== */
  .alc-library {
    position: absolute;
    top: 96px; right: 0; bottom: 0;
    width: 340px;
    background: var(--paper);
    border-left: 2px solid var(--ink);
    display: flex;
    flex-direction: column;
    z-index: 5;
  }
  .alc-library-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 16px 18px 8px;
    border-bottom: 1px dashed rgba(14,14,14,0.2);
  }
  .alc-library-title {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.04em;
  }
  .alc-library-count {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .alc-search-wrap { padding: 10px 18px; }
  .alc-search {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--ink);
    padding: 8px 12px;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    font-family: 'DM Mono', monospace;
  }
  .alc-search::placeholder { color: rgba(14,14,14,0.4); }

  .alc-recent {
    padding: 0 18px 10px;
  }
  .alc-recent-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 6px;
  }
  .alc-recent-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .alc-recent-dot {
    width: 32px; height: 32px;
    border: 2px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: help;
    box-shadow: 2px 2px 0 var(--ink);
    padding: 3px;
    background: var(--bg);
  }
  .alc-recent-dot svg { display: block; width: 100%; height: 100%; }

  .alc-library-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--ink) transparent;
  }
  .alc-library-list::-webkit-scrollbar { width: 8px; }
  .alc-library-list::-webkit-scrollbar-thumb { background: var(--ink); }

  .alc-lib-item {
    position: relative;
    background: var(--bg);
    border: 2px solid var(--ink);
    padding: 8px 4px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: grab;
    transition: transform 0.08s, box-shadow 0.08s;
    box-shadow: 2px 2px 0 var(--ink);
    --tint: var(--gold);
    min-height: 86px;
    touch-action: none;
  }
  .alc-lib-item:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .alc-lib-item:active { cursor: grabbing; }
  .alc-lib-emoji {
    width: 36px; height: 36px;
    line-height: 1;
    pointer-events: none;
    display: block;
  }
  .alc-lib-emoji svg { display: block; width: 100%; height: 100%; }
  .alc-lib-name {
    font-size: 9px;
    letter-spacing: 0.02em;
    text-align: center;
    text-transform: lowercase;
    line-height: 1.15;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
    width: 100%;
  }
  .alc-lib-tier {
    position: absolute;
    top: 2px; right: 3px;
    font-size: 8px;
    letter-spacing: 0.1em;
    color: var(--tint);
    font-weight: 700;
    pointer-events: none;
    opacity: 0.85;
  }
  .alc-lib-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 30px 10px;
    font-size: 12px;
    opacity: 0.55;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ====================== library scroll strip ====================== */
  .alc-library-scroll-area {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .alc-lib-strip {
    display: none; /* revealed on mobile via media query */
    width: 36px;
    flex-shrink: 0;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-left: 2px solid var(--ink);
    background: var(--paper-2);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: ns-resize;
  }
  .alc-lib-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 8px 0;
    color: var(--ink);
    opacity: 0.15;
    transition: opacity 0.2s;
  }
  .alc-lib-arrow.can-scroll { opacity: 1; }
  .alc-lib-track {
    flex: 1;
    width: 3px;
    background: rgba(14,14,14,0.15);
    margin: 2px 0;
  }

  /* ====================== ghost (drag preview) ====================== */
  .alc-ghost {
    position: fixed;
    width: 64px; height: 64px;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 1000;
    transform: rotate(-3deg) scale(1.05);
    --tint: var(--gold);
  }
  .alc-ghost .alc-tile-emoji { width: 44px; height: 44px; }
  .alc-ghost svg { display: block; width: 100%; height: 100%; }
  .alc-ghost::before {
    content: '';
    position: absolute; inset: -2px;
    background: var(--tint);
    opacity: 0.2;
    z-index: -1;
  }

  /* ====================== ticker ====================== */
  .alc-ticker {
    position: absolute;
    bottom: 0; left: 0;
    right: 340px;
    height: 72px;
    border-top: 2px solid var(--ink);
    background: linear-gradient(0deg, rgba(242,237,227,0.96), rgba(242,237,227,0.84));
    display: flex; align-items: center;
    padding: 0 24px;
    gap: 24px;
    z-index: 6;
  }
  .alc-ticker-label {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.16em;
  }
  .alc-ticker-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .alc-ticker-hint {
    display: flex; align-items: center; gap: 6px;
    border: 2px solid var(--ink);
    background: var(--paper);
    padding: 6px 10px;
    box-shadow: 2px 2px 0 var(--ink);
    font-size: 16px;
  }
  .alc-ticker-icon {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .alc-ticker-icon svg { display: block; width: 100%; height: 100%; }
  .alc-ticker-plus {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    opacity: 0.7;
  }
  .alc-ticker-q {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 22px;
    color: var(--orange);
  }
  .alc-ticker-empty {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* ====================== toasts ====================== */
  .alc-toasts {
    position: absolute;
    top: 110px; left: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20;
    pointer-events: none;
  }
  .alc-toast {
    display: flex; align-items: center; gap: 14px;
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 10px 16px 10px 12px;
    box-shadow: 5px 5px 0 var(--ink);
    min-width: 280px;
    animation: toast-slide 0.4s cubic-bezier(.34,1.6,.4,1), toast-out 0.5s ease 2.8s forwards;
    --tint: var(--gold);
    position: relative;
  }
  .alc-toast::before {
    content: '';
    position: absolute; left: -2px; top: -2px; bottom: -2px;
    width: 8px;
    background: var(--tint);
  }
  @keyframes toast-slide {
    from { transform: translateX(-30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes toast-out {
    to { transform: translateY(-8px); opacity: 0; }
  }
  .alc-toast-glyph {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    border: 2px solid var(--ink);
    padding: 4px;
  }
  .alc-toast-glyph svg { display: block; width: 100%; height: 100%; }
  .alc-toast-text { flex: 1; }
  .alc-toast-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .alc-toast-name {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 20px;
    text-transform: lowercase;
    line-height: 1.05;
  }
  .alc-toast-spark {
    font-size: 22px;
    color: var(--tint);
    animation: spark-rot 2s linear infinite;
  }
  @keyframes spark-rot { to { transform: rotate(360deg); } }

  /* ====================== help ====================== */
  .alc-help-backdrop {
    position: fixed; inset: 0;
    background: rgba(14,14,14,0.55);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    animation: fade 0.3s;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .alc-help {
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 10px 10px 0 var(--ink);
    padding: 40px 48px;
    max-width: 560px;
    width: 90%;
    text-align: center;
    animation: pop 0.5s cubic-bezier(.34,1.6,.4,1);
  }
  @keyframes pop {
    from { transform: scale(0.6) rotate(-3deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }
  .alc-help-eye {
    font-size: 56px;
    color: var(--orange);
    animation: spark-rot 8s linear infinite;
  }
  .alc-help-title {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 64px;
    line-height: 0.85;
    letter-spacing: -0.02em;
    margin-top: 12px;
  }
  .alc-help-sub {
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 6px;
  }
  .alc-help-rules {
    margin: 32px 0 28px;
    display: flex; flex-direction: column; gap: 14px;
    text-align: left;
  }
  .alc-help-row { display: grid; grid-template-columns: 48px 1fr; gap: 16px; align-items: start; }
  .alc-help-num {
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 24px;
    color: var(--magenta);
  }
  .alc-help-body {
    font-size: 14px;
    line-height: 1.5;
  }
  .alc-help-body b { color: var(--orange); }
  .alc-help-start {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 14px 36px;
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--orange);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .alc-help-start:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--orange); }
  .alc-help-start:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--orange); }
  .alc-help-footnote {
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* ====================== responsive ====================== */
  @media (max-width: 900px) {
    /* Keep the original 3-col grid but collapse to ~54px by hiding tall items */
    .alc-topbar {
      grid-template-columns: 1fr auto 1fr;
      height: 54px;
      padding: 0 14px;
      gap: 12px;
    }
    /* Strip the tagline and counter chrome — too tall for mobile */
    .alc-tagline { display: none; }
    .alc-logo { font-size: 26px; line-height: 1; }
    .alc-counter-bar { display: none; }
    .alc-counter-label { display: none; }
    .alc-counter { gap: 4px; }
    .alc-counter-discovered { font-size: 26px; }
    .alc-counter-slash, .alc-counter-total { font-size: 18px; }
    /* Compact action buttons */
    .alc-actions { gap: 6px; }
    .alc-btn {
      min-height: 36px;
      padding: 4px 10px;
      font-size: 13px;
      box-shadow: 2px 2px 0 var(--ink);
    }
    .alc-btn:hover { box-shadow: 3px 3px 0 var(--ink); }

    /* Play area — sits under 54px topbar, above library (230px) + ticker (60px) */
    .alc-playarea { right: 0; top: 54px; bottom: 290px; }

    /* Library — horizontal strip at bottom above ticker */
    .alc-library {
      top: auto; right: 0; left: 0; bottom: 60px;
      width: 100%; height: 230px;
      border-top: 2px solid var(--ink); border-left: none;
    }
    /* Hide recent section — saves ~52px so 2 grid rows are visible */
    .alc-recent { display: none; }
    /* Slightly shorter grid items to fit 2 rows comfortably */
    .alc-lib-item { min-height: 74px; }
    .alc-lib-emoji { width: 30px; height: 30px; }
    /* Show the scroll strip; 5-col grid to share space with it */
    .alc-lib-strip { display: flex; }
    .alc-library-list { grid-template-columns: repeat(5, 1fr); }
    /* Hide native scrollbar — strip is the scroll UI */
    .alc-library-list { scrollbar-width: none; }
    .alc-library-list::-webkit-scrollbar { display: none; }

    /* Ticker — full width, horizontally scrollable hints */
    .alc-ticker { right: 0; height: 60px; padding: 0 14px; gap: 12px; }
    .alc-ticker-row { flex-wrap: nowrap; overflow-x: auto; }

    /* Tile × always visible on touch (no hover state on phones) */
    .alc-tile-x { opacity: 1; width: 22px; height: 22px; font-size: 15px; top: -10px; right: -10px; }

    /* Toasts just below topbar */
    .alc-toasts { top: 64px; left: 12px; }
    .alc-toast { min-width: 220px; }
  }

  @media (max-width: 600px) {
    .alc-topbar { height: 50px; padding: 0 10px; gap: 8px; }
    .alc-logo { font-size: 22px; }
    .alc-counter-discovered { font-size: 22px; }
    .alc-counter-slash, .alc-counter-total { font-size: 15px; }
    .alc-btn { font-size: 11px; padding: 4px 8px; min-height: 32px; }

    /* Play area */
    .alc-playarea { top: 50px; bottom: 268px; }

    /* Library tighter */
    .alc-library { height: 208px; bottom: 60px; }
    .alc-library-list { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .alc-library-head { padding: 8px 12px 4px; }
    .alc-library-title { font-size: 16px; }
    .alc-search-wrap { padding: 6px 12px; }
    .alc-search { padding: 5px 8px; font-size: 12px; }
    .alc-recent { padding: 0 12px 6px; }

    /* Ticker tighter */
    .alc-ticker { height: 60px; padding: 0 12px; gap: 8px; }
    .alc-ticker-label { font-size: 13px; letter-spacing: 0.06em; }
    .alc-ticker-hint { padding: 3px 7px; font-size: 13px; gap: 3px; }
    .alc-ticker-icon { width: 18px; height: 18px; }

    /* Help modal */
    .alc-help { padding: 20px 16px; }
    .alc-help-title { font-size: 38px; }
    .alc-help-eye { font-size: 32px; }
    .alc-help-rules { margin: 16px 0 14px; gap: 8px; }
    .alc-help-body { font-size: 12px; }
    .alc-help-start { padding: 10px 20px; font-size: 16px; }
    .alc-help-footnote { font-size: 10px; }

    /* Toasts compact */
    .alc-toasts { top: 60px; left: 8px; }
    .alc-toast { min-width: 180px; padding: 7px 10px 7px 8px; gap: 8px; }
    .alc-toast-glyph { width: 32px; height: 32px; }
    .alc-toast-name { font-size: 14px; }
  }

</style>
</head>
